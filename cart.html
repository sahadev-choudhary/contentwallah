<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — ContentWala</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="inner-page">

<nav class="navbar scrolled" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo" style="text-decoration:none;">
      <img src="logo.svg" alt="ContentWallah" style="height:36px;width:auto;">
    </a>
    <ul class="nav-links">
      <li><a href="index.html#products">Products</a></li>
      <li><a href="index.html#how">How It Works</a></li>
      <li><a href="index.html#testimonials">Results</a></li>
    </ul>
    <a href="cart.html" class="cart-nav-btn" id="cartNavBtn">🛒 <span id="cartCount">0</span></a>
    <a href="index.html#products" class="btn-nav">Shop More →</a>
    <button class="hamburger" id="hamburger">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="index.html#products">Products</a>
    <a href="cart.html">🛒 Cart</a>
  </div>
</nav>

<div class="container">
  <div style="padding:40px 0 0;">
    <div class="breadcrumb">
      <a href="index.html">Home</a> › <span>Shopping Cart</span>
    </div>
    <h1 style="font-size:clamp(1.8rem,3vw,2.5rem);font-weight:900;font-family:'Space Grotesk',sans-serif;margin-bottom:8px;">Your Cart 🛒</h1>
    <p style="color:var(--gray);margin-bottom:0;" id="cartSubtitle">Loading...</p>
  </div>

  <div id="cartContent"></div>
</div>

<footer class="footer" style="margin-top:80px;">
  <div class="container">
    <div class="footer-bottom" style="border-top:1px solid var(--border);padding-top:24px;text-align:center;color:var(--gray);font-size:0.85rem;">
      <p>© 2025 ContentWallah — A Helpverse Initiative. | <a href="index.html" style="color:var(--purple-light);">Home</a> | <a href="index.html#products" style="color:var(--purple-light);">Products</a></p>
    </div>
  </div>
</footer>

<script src="products-data.js"></script>
<script>
function updateCartUI() {
  const c = Cart.count();
  document.getElementById('cartCount').textContent = c;
}

function renderCart() {
  const items = Cart.get();
  const container = document.getElementById('cartContent');
  const subtitle = document.getElementById('cartSubtitle');

  if (items.length === 0) {
    subtitle.textContent = 'Your cart is empty.';
    container.innerHTML = `
      <div class="empty-cart">
        <div class="e-icon">🛒</div>
        <h2>Your cart is empty</h2>
        <p>Discover our premium creator kits and start growing today.</p>
        <a href="index.html#products" class="btn-primary">Browse Creator Kits →</a>
      </div>`;
    return;
  }

  subtitle.textContent = items.length + ' item' + (items.length > 1 ? 's' : '') + ' in your cart';
  const subtotal = Cart.total();
  const savings = items.reduce((s, i) => s + ((PRODUCTS[i.id]?.oldPrice || 0) - (PRODUCTS[i.id]?.price || 0)), 0);

  container.innerHTML = `
    <div class="cart-layout">
      <div>
        <div class="cart-items-list" id="cartItemsList">
          ${items.map(item => {
            const p = PRODUCTS[item.id];
            if (!p) return '';
            return `
              <div class="cart-item" id="ci-${p.id}">
                <div class="cart-item-icon">${p.icon}</div>
                <div class="cart-item-info">
                  <h3>${p.name}</h3>
                  <div class="ci-price">₹${p.price.toLocaleString('en-IN')} <span style="color:var(--gray);font-size:0.82rem;text-decoration:line-through;font-weight:400;">₹${p.oldPrice.toLocaleString('en-IN')}</span></div>
                  <div class="ci-delivery">⚡ Instant digital delivery</div>
                </div>
                <button class="cart-item-remove" onclick="removeItem('${p.id}')" title="Remove">✕</button>
              </div>`;
          }).join('')}
        </div>
        <div style="margin-top:20px;">
          <button onclick="if(confirm('Clear all items?')) { Cart.clear(); renderCart(); updateCartUI(); }" style="background:none;border:1px solid rgba(239,68,68,0.3);color:#ef4444;border-radius:8px;padding:10px 18px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='none'">
            🗑 Clear Cart
          </button>
        </div>
      </div>

      <div>
        <div class="cart-summary-card">
          <h3>Order Summary</h3>
          ${items.map(item => {
            const p = PRODUCTS[item.id];
            if (!p) return '';
            return `<div class="summary-row"><span>${p.icon} ${p.name}</span><span>₹${p.price.toLocaleString('en-IN')}</span></div>`;
          }).join('')}
          <div class="summary-row"><span>You Save</span><span style="color:#10b981;">-₹${savings.toLocaleString('en-IN')}</span></div>
          <div class="summary-row"><span>Delivery</span><span style="color:#10b981;">FREE ⚡ Instant</span></div>
          <div class="summary-row total"><span>Total</span><span class="s-price">₹${subtotal.toLocaleString('en-IN')}</span></div>
          <a href="checkout.html" class="btn-primary checkout-btn glow-btn">Proceed to Checkout →</a>
          <div style="text-align:center;margin-top:12px;font-size:0.78rem;color:var(--gray);">🔒 Secure Checkout &nbsp;|&nbsp; ⚡ Instant Delivery</div>
        </div>
        <div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:16px;margin-top:16px;">
          <div style="font-size:0.85rem;color:#10b981;font-weight:700;margin-bottom:6px;">🎉 You're saving ₹${savings.toLocaleString('en-IN')}!</div>
          <div style="font-size:0.8rem;color:var(--gray);">Limited-time discount applied automatically.</div>
        </div>
        <a href="index.html#products" style="display:block;text-align:center;margin-top:16px;color:var(--gray);font-size:0.85rem;text-decoration:none;">← Continue Shopping</a>
      </div>
    </div>`;
}

function removeItem(id) {
  Cart.remove(id);
  updateCartUI();
  renderCart();
}

document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('mobileMenu').classList.toggle('open');
});

updateCartUI();
renderCart();
window.addEventListener('cartUpdated', updateCartUI);
</script>
</body>
</html>
