<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" width="320" height="110">
  <defs>
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="wallahGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- C ring (open circle, metallic) -->
  <path d="M 52 8 A 38 38 0 1 0 68 72" fill="none" stroke="url(#cGrad)" stroke-width="9" stroke-linecap="round"/>
  <!-- Inner shadow for 3D C -->
  <path d="M 50 12 A 34 34 0 1 0 64 68" fill="none" stroke="rgba(15,23,42,0.4)" stroke-width="4" stroke-linecap="round"/>

  <!-- Play triangle (purple, center of C) -->
  <polygon points="30,35 30,55 46,45" fill="#9333ea" filter="url(#glow)"/>
  <!-- Chat bubble notch at bottom of C -->
  <polygon points="28,68 38,62 32,76" fill="#9333ea"/>

  <!-- W letter (purple-blue gradient) -->
  <text x="44" y="74" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="52" fill="url(#wGrad)" filter="url(#glow)">W</text>

  <!-- Pixel dots (top-right of W) -->
  <rect x="100" y="8"  width="10" height="10" rx="2" fill="#a855f7"/>
  <rect x="112" y="4"  width="7"  height="7"  rx="1" fill="#8b5cf6" opacity="0.8"/>
  <rect x="106" y="20" width="6"  height="6"  rx="1" fill="#3b82f6" opacity="0.65"/>
  <rect x="118" y="15" width="5"  height="5"  rx="1" fill="#6366f1" opacity="0.5"/>

  <!-- ContentWallah text -->
  <text x="128" y="52" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="30" fill="#f1f5f9">Content</text>
  <text x="253" y="52" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="30" fill="url(#wallahGrad)">Wallah</text>

  <!-- Divider line with diamond -->
  <line x1="128" y1="62" x2="312" y2="62" stroke="#334155" stroke-width="1.2"/>
  <rect x="218" y="58" width="8" height="8" rx="1" fill="#3b82f6" transform="rotate(45 222 62)"/>

  <!-- A Helpverse Initiative -->
  <text x="128" y="80" font-family="Arial,sans-serif" font-size="11.5" fill="#64748b" letter-spacing="2.5">A HELPVERSE INITIATIVE</text>
</svg>
